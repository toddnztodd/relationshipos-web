<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />

    <!-- Viewport — viewport-fit=cover for iPhone notch/home indicator -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>Relate</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme colour (Android Chrome + Safari tab bar) -->
    <meta name="theme-color" content="#6FAF8F" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Relate" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Splash screen style -->
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #F8F7F4;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash-logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: #6FAF8F;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
      }
      #splash-letter {
        font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
        font-size: 38px;
        font-weight: 300;
        color: #ffffff;
        letter-spacing: -0.02em;
        line-height: 1;
      }
      #splash-name {
        font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
        font-size: 22px;
        font-weight: 300;
        color: #6FAF8F;
        letter-spacing: 0.05em;
      }
      #splash-tagline {
        font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
        font-size: 12px;
        font-weight: 400;
        color: #9ca3af;
        letter-spacing: 0.04em;
        margin-top: 6px;
      }
    </style>
  </head>

  <body>
    <!-- Splash screen — fades out once React hydrates -->
    <div id="splash">
      <div id="splash-logo">
        <span id="splash-letter">R</span>
      </div>
      <span id="splash-name">Relate</span>
      <span id="splash-tagline">The Relationship Operating System</span>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>

    <!-- Dismiss splash after DOMContentLoaded -->
    <script>
      window.addEventListener('DOMContentLoaded', function () {
        var splash = document.getElementById('splash');
        if (!splash) return;
        setTimeout(function () {
          splash.style.opacity = '0';
          setTimeout(function () {
            if (splash.parentNode) splash.parentNode.removeChild(splash);
          }, 400);
        }, 600);
      });
    </script>
  </body>

</html>
